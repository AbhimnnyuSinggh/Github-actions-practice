name: Deploy to EC2

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Pull Docker Image
        run: docker pull abhimnyusingh/github-actions-app:latest

      - name: Stop old container
        run: docker stop my_app || true

      - name: Remove old container
        run: docker rm my_app || true

      - name: Run with docker-compose
        run: docker-compose up -d