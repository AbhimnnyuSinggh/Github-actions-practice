#Linting and SAST (Static application security test) scan 
# lint - flake8 & SAST - Bandit
name: Code-quality

on:
    workflow_call:

jobs:
    validate:
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix:
                python-version: ["3.11" , "3.12" , "3.13"]
        
        steps:
            - name: Copy Code
              uses: actions/checkout@v4

            - name: Install python ${{ matrix.python-version }}
              uses: actions/setup-python@v5
              with:
                python-version: ${{ matrix.python-version }}

            - name: Install Dependencies
              run: | 
                python -m pip install -r Github-actions-practice/requirements.txt
                pip install flake8 bandit
            
            - name: Run Linter
              run: flake8 app.py || true

            - name: Run SAST
              run:  bandit -r app.py



