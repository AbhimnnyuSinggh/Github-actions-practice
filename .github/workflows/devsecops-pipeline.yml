#To or interweave the tasks
name: DevSecOps Pipeline Main

on:
    push:
        branches: [main]
    workflow_dispatch:

jobs:

    # CI (Continous Integration with Security Scanning)

    code-quality:
        uses: ./.github/workflows/code-quality.yml

    secrets-scan:
        uses: ./.github/workflows/secrets-scan.yml
        secrets: inherit

    dependency-scan:
        uses: ./.github/workflows/dependency-scan.yml

    docker-lint:
        uses: ./.github/workflows/docker-lint.yml

    # Build once the security scans and tests are complete

    build:
        needs: [code-quality , secrets-scan , dependency-scan , docker-lint]
        uses: ./.github/workflows/docker-build-and-push.yml
        secrets: inherit

    trivy: 
        needs: [build]
        uses: ./.github/workflows/image-scan.yml
        secrets: inherit

    #Deploy to Production

    deploy:
        needs: [trivy]
        uses: ./.github/workflows/deploy-to-server.yml
        secrets: inherit


    
        
